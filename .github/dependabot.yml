version: 2
updates:
  # Keep GitHub Actions pinned to current SHA digests
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Bundle all action bumps into one PR. codeql-action's init/analyze steps
    # must move in lockstep (analyze rejects a config written by a different
    # init version); ungrouped, Dependabot split them into two PRs that each
    # failed with a version mismatch. Grouping keeps coupled actions together.
    groups:
      github-actions:
        patterns:
          - "*"

  # npm: published provenance primitive
  - package-ecosystem: "npm"
    directory: "/primitives/js"
    schedule:
      interval: "weekly"

  # npm: JS enforcement adapters (private, dev-only)
  - package-ecosystem: "npm"
    directory: "/adapters/js"
    schedule:
      interval: "weekly"

  # pip: pinned test/release dependencies.
  #
  # requirements-test.txt is a *universal* uv-compiled lock (see its header and
  # scripts/check-lock-sync.py): it carries `python_full_version` markers so the
  # supported Python 3.9 runtime keeps installable pins even where newer releases
  # require >=3.10. Dependabot can't run uv, so it flattens those markers and
  # breaks the 3.9 CI leg. The `lockfile` CI job now catches that, but a pip PR
  # here still needs its lock recompiled before it can go green:
  #   uv pip compile requirements-test.in --generate-hashes --universal \
  #       --python-version 3.9 -o requirements-test.txt
  # Grouped into a single PR to keep that manual recompile to once per cycle.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      pip:
        patterns:
          - "*"
