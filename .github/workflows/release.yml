name: Release

# Fires when you push a version tag (e.g. v0.3.0). Runs the test suites as a
# gate, then publishes the npm + PyPI packages and creates the GitHub release.
# The packages publish at whatever version is in the manifests at the tagged
# commit — so tag the commit AFTER the version-bump PR is merged.
#
# Auth is OIDC trusted publishing — no stored tokens. One-time, register a
# GitHub Actions trusted publisher for this repo + this workflow on each registry
# (npm: package settings → Trusted Publisher; PyPI: project → Publishing →
# Trusted Publishers).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub release
  id-token: write   # mint the OIDC token for trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- gate: tests must pass before anything is published ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: JS tests
        working-directory: primitives/js
        run: npm install && npm test
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python tests
        working-directory: primitives/python
        run: python -m pip install --upgrade pip pytest && python -m pytest -q

      # --- publish npm via OIDC trusted publishing (requires npm >= 11.5.1;
      #     publishes provenance attestations by default) ---
      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Publish to npm
        working-directory: primitives/js
        run: npm publish

      # --- publish PyPI via OIDC trusted publishing (no password input) ---
      - name: Build Python package
        working-directory: primitives/python
        run: python -m pip install --upgrade build && python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: primitives/python/dist

      # --- GitHub release with auto-generated notes ---
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "plumb-line $GITHUB_REF_NAME"
