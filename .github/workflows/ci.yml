name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  versions:
    name: Manifest versions agree
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: "20"
      - name: The 3 release manifests must report the same version
        run: node scripts/check-versions.mjs
      - name: The plugin-bundled primitive must not drift from primitives/
        run: node scripts/check-bundle-sync.mjs

  javascript:
    name: JavaScript (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ["20"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: ${{ matrix.node }}
      - name: primitives/js — provenance primitive
        working-directory: primitives/js
        run: npm ci && npm test
      - name: adapters/js — enforcement adapters
        working-directory: adapters/js
        run: npm ci && npm test
      - name: conformance report (envelope schema)
        run: node primitives/conformance/report.mjs
      - name: conformance against the plugin-bundled copy
        run: node scripts/check-bundle-conformance.mjs

  lint:
    name: Lint (ESLint + Ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: "20"
      - name: ESLint — primitives/js
        working-directory: primitives/js
        run: npm ci && npm run lint
      - name: ESLint — adapters/js
        working-directory: adapters/js
        run: npm ci && npm run lint
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: install lint deps (hash-pinned)
        # --require-hashes: ruff (and all deps) must match a hash in the lock.
        run: pip install --require-hashes -r requirements-test.txt
      - name: Ruff — Python source
        run: ruff check .

  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python }}
      - name: adapters — guarded imports work with NO extras installed
        run: python scripts/check_adapter_guarded_imports.py
      - name: install test deps
        # --require-hashes: every dep (incl. transitive) must match a hash in
        # the lock, so a compromised index cannot swap in a tampered wheel.
        run: pip install --require-hashes -r requirements-test.txt
      - name: primitives/python — provenance primitive
        working-directory: primitives/python
        run: python -m pytest -q
      - name: adapters/python — enforcement adapters
        working-directory: adapters/python
        run: python -m pytest -q
      - name: examples — fixtures + real import-linter boundary
        run: python -m pytest -q examples
      - name: conformance against the plugin-bundled Python copy
        run: python -m pytest -q scripts/test_bundle_conformance.py
