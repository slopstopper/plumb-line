name: DCO

# Every commit in a PR must carry a Developer Certificate of Origin sign-off
# (a `Signed-off-by:` trailer matching the commit author). See ./DCO and
# CONTRIBUTING.md. Contributors can enable automatic sign-off with
# `git config core.hooksPath .githooks`, or use `git commit -s`.

on:
  pull_request:

permissions: {}

concurrency:
  group: dco-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: Commits signed off (DCO)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Every non-merge commit carries a matching Signed-off-by
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          # Dependabot PRs are opened by the authenticated `dependabot[bot]` actor —
          # a login a human contributor cannot forge (unlike commit-author metadata,
          # which anyone can set). Its dependency bumps are mechanical, carry no
          # human authorship to certify, and are signed off with a fixed noreply
          # address that never matches its author email, so they can never satisfy
          # the exact-match check below. Exempt such PRs wholesale. This gates on
          # the authenticated PR author, NOT the spoofable commit `%an`, so it can't
          # be bypassed by authoring a commit as "dependabot[bot]". The job still
          # runs and reports success, so a required-check gate stays satisfied.
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "PR opened by dependabot[bot] — DCO-exempt (mechanical bot bumps). ✓"
            exit 0
          fi
          fail=0
          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            author="$(git show -s --format='%an <%ae>' "$sha")"
            subject="$(git show -s --format='%s' "$sha")"
            if git show -s --format='%B' "$sha" | grep -qxiF "Signed-off-by: $author"; then
              echo "ok   ${sha:0:8}  $subject"
            else
              echo "FAIL ${sha:0:8}  $subject"
              echo "     expected trailer: Signed-off-by: $author"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more commits lack a DCO sign-off matching their author. Fix with: git rebase --signoff ${BASE_SHA}..HEAD && git push --force-with-lease  — or enable auto sign-off: git config core.hooksPath .githooks"
            exit 1
          fi
          echo "All commits signed off. ✓"
