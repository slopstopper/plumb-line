<svg viewBox="14 10 82 126" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="plumb-line logo">
  <defs>
    <!-- P + L foot: blue gradient top-to-bottom for depth -->
    <linearGradient id="pg" x1="25" y1="18" x2="25" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- L foot: same hue, right-to-left so the bright end is near the bob -->
    <linearGradient id="lg" x1="78" y1="126" x2="36" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- Plumb bob: warm amber radial gradient -->
    <radialGradient id="bg" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="45%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <!-- Drop shadow under the bob -->
    <filter id="bs" x="-50%" y="-20%" width="200%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="o"/>
      <feFlood flood-color="#451a03" flood-opacity="0.25" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Plumb string: perfectly vertical, drawn under P so P covers the junction -->
  <line x1="78" y1="42" x2="78" y2="106"
        stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- P: stem + bowl arc, gradient stroke for depth -->
  <path d="M 25,82 L 25,18 C 93,18 93,66 25,66"
        fill="none" stroke="url(#pg)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pin at bowl tip: anchors the string visually -->
  <circle cx="78" cy="42" r="3" fill="#2563eb"/>

  <!-- Provenance chain: three nodes on the string -->
  <circle cx="78" cy="75"  r="3.5" fill="#3b82f6"/>
  <circle cx="78" cy="88"  r="3.5" fill="#3b82f6"/>
  <circle cx="78" cy="101" r="3.5" fill="#3b82f6"/>

  <!-- Plumb bob weight: amber teardrop -->
  <path d="M 78,106 C 90,106 91,117 78,122 C 65,117 66,106 78,106 Z"
        fill="url(#bg)" filter="url(#bs)"/>

  <!-- Reversed L foot: gradient stroke, longer reach toward P -->
  <line x1="78" y1="126" x2="36" y2="126"
        stroke="url(#lg)" stroke-width="8" stroke-linecap="round"/>
</svg>
