<svg viewBox="14 10 82 126" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="plumb-line logo">
  <defs>
    <!-- P body: diagonal blue gradient, light top-left to deep bottom-right for a 3D tube -->
    <linearGradient id="pg" x1="20" y1="16" x2="58" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <!-- L foot: GitHub CI-passing green, bright end nearest the bob -->
    <linearGradient id="lg" x1="80" y1="121" x2="22" y2="131" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4ac26b"/>
      <stop offset="55%"  stop-color="#2da44e"/>
      <stop offset="100%" stop-color="#176f2c"/>
    </linearGradient>
    <!-- Plumb string: thin green line down to the bob -->
    <linearGradient id="sg" x1="78" y1="42" x2="78" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4ac26b"/>
      <stop offset="100%" stop-color="#2da44e"/>
    </linearGradient>
    <!-- Plumb bob: warm amber radial gradient for a polished, dimensional weight -->
    <radialGradient id="bg" cx="36%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="42%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <!-- Drop shadow under the bob -->
    <filter id="bs" x="-60%" y="-30%" width="220%" height="190%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.1" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="o"/>
      <feFlood flood-color="#451a03" flood-opacity="0.28" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft blur for the glossy core highlights -->
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
  </defs>

  <!-- Plumb string: perfectly vertical, drawn under P so P covers the junction -->
  <line x1="78" y1="42" x2="78" y2="105"
        stroke="url(#sg)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- P: stem + bowl arc. Body stroke, then a soft white core for a rounded 3D tube. -->
  <path d="M 25,116 L 25,18 C 93,18 93,66 25,66" fill="none" stroke="url(#pg)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 25,116 L 25,18 C 93,18 93,66 25,66" fill="none" stroke="#ffffff" stroke-opacity="0.55"
        stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>

  <!-- Pin at bowl tip: anchors the string visually -->
  <circle cx="78" cy="42" r="3" fill="#2563eb"/>

  <!-- Provenance chain: three blue nodes on the string -->
  <circle cx="78" cy="75"  r="3.5" fill="#3b82f6"/>
  <circle cx="78" cy="88"  r="3.5" fill="#3b82f6"/>
  <circle cx="78" cy="101" r="3.5" fill="#3b82f6"/>

  <!-- Plumb bob weight: amber teardrop with a pointed tip and specular highlight -->
  <path d="M 78,105 C 88,105 88,114 84,118 C 81.5,121 79.5,123 78,125 C 76.5,123 74.5,121 72,118 C 68,114 68,105 78,105 Z" fill="url(#bg)" filter="url(#bs)"/>
  <ellipse cx="74.2" cy="110" rx="2.2" ry="1.5" fill="#fffbe6" opacity="0.6"
           transform="rotate(-32 74.2 110)" filter="url(#soft)"/>

  <!-- Reversed L foot: green body + glossy core, longer reach toward P -->
  <path d="M 78,126 L 25,126" fill="none" stroke="url(#lg)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 78,126 L 25,126" fill="none" stroke="#ffffff" stroke-opacity="0.55"
        stroke-width="2.3" stroke-linecap="round" filter="url(#soft)"/>
</svg>
