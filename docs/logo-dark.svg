<svg viewBox="20 8 60 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="plumb-line logo">
  <defs>
    <linearGradient id="cyl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c2d12"/>
      <stop offset="22%"  stop-color="#b45309"/>
      <stop offset="50%"  stop-color="#fde68a"/>
      <stop offset="78%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#5c2310"/>
    </linearGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="62%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a1503" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="0.6"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2.2"/></filter>
    <filter id="ds" x="-70%" y="-30%" width="240%" height="210%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="b"/>
      <feOffset in="b" dx="0.8" dy="2.2" result="o"/>
      <feFlood flood-color="#451a03" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="41" y="11" width="18" height="5" rx="2.5" fill="#8b98a5"/>
  <line x1="50" y1="14" x2="50" y2="72" stroke="#3f4853" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="50" cy="52" r="9" fill="#fbbf24" opacity="0.55" filter="url(#glow)"/>

  <circle cx="50" cy="26" r="5.6" fill="#3fb950" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="48" cy="24" rx="2" ry="1.3" fill="#fff" opacity="0.4" filter="url(#soft)"/>
  <circle cx="50" cy="39" r="5.6" fill="#3fb950" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="48" cy="37" rx="2" ry="1.3" fill="#fff" opacity="0.4" filter="url(#soft)"/>
  <circle cx="50" cy="52" r="5.6" fill="#f59e0b" stroke="#b45309" stroke-width="0.6"/>
  <ellipse cx="48" cy="50" rx="2" ry="1.3" fill="#fff" opacity="0.4" filter="url(#soft)"/>
  <circle cx="50" cy="65" r="5.6" fill="#f59e0b" stroke="#b45309" stroke-width="0.6"/>
  <ellipse cx="48" cy="63" rx="2" ry="1.3" fill="#fff" opacity="0.4" filter="url(#soft)"/>

  <rect x="47.4" y="67.5" width="5.2" height="4.5" rx="1.3" fill="#b45309"/>
  <g filter="url(#ds)">
    <path d="M 50,71 C 59,71 63,79 63,87 C 63,98 57,109 50,120 C 43,109 37,98 37,87 C 37,79 41,71 50,71 Z" fill="url(#cyl)"/>
    <path d="M 50,71 C 59,71 63,79 63,87 C 63,98 57,109 50,120 C 43,109 37,98 37,87 C 37,79 41,71 50,71 Z" fill="url(#shade)"/>
  </g>
  <path d="M 47,74 C 43,79 43,92 46,103" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="2.4" stroke-linecap="round" filter="url(#soft)"/>
