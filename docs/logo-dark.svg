<svg viewBox="14 10 82 126" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="plumb-line logo">
  <defs>
    <!-- P body: brighter blue gradient tuned for dark backgrounds -->
    <linearGradient id="pg" x1="20" y1="16" x2="58" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="50%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- L foot: GitHub dark-mode CI green -->
    <linearGradient id="lg" x1="80" y1="121" x2="22" y2="131" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#56d364"/>
      <stop offset="55%"  stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="sg" x1="78" y1="42" x2="78" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#56d364"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <radialGradient id="bg" cx="36%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="42%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <filter id="bs" x="-60%" y="-30%" width="220%" height="190%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.1" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="o"/>
      <feFlood flood-color="#78350f" flood-opacity="0.4" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
  </defs>

  <line x1="78" y1="42" x2="78" y2="105"
        stroke="url(#sg)" stroke-width="1.6" stroke-linecap="round"/>

  <path d="M 25,116 L 25,18 C 93,18 93,66 25,66" fill="none" stroke="url(#pg)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 25,116 L 25,18 C 93,18 93,66 25,66" fill="none" stroke="#ffffff" stroke-opacity="0.42"
        stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>

  <circle cx="78" cy="42" r="3" fill="#93c5fd"/>

  <circle cx="78" cy="75"  r="3.5" fill="#60a5fa"/>
  <circle cx="78" cy="88"  r="3.5" fill="#60a5fa"/>
  <circle cx="78" cy="101" r="3.5" fill="#60a5fa"/>

  <path d="M 78,105 C 88,105 88,114 84,118 C 81.5,121 79.5,123 78,125 C 76.5,123 74.5,121 72,118 C 68,114 68,105 78,105 Z" fill="url(#bg)" filter="url(#bs)"/>
  <ellipse cx="74.2" cy="110" rx="2.2" ry="1.5" fill="#fffbe6" opacity="0.6"
           transform="rotate(-32 74.2 110)" filter="url(#soft)"/>

  <path d="M 78,126 L 25,126" fill="none" stroke="url(#lg)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 78,126 L 25,126" fill="none" stroke="#ffffff" stroke-opacity="0.42"
        stroke-width="2.3" stroke-linecap="round" filter="url(#soft)"/>
</svg>
