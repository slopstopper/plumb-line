<svg viewBox="14 10 82 133" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="plumb-line logo">
  <defs>
    <linearGradient id="pg" x1="25" y1="18" x2="25" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lg" x1="78" y1="130" x2="57" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="bg" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="45%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <filter id="bs" x="-50%" y="-20%" width="200%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="o"/>
      <feFlood flood-color="#78350f" flood-opacity="0.4" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <line x1="78" y1="42" x2="78" y2="110"
        stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>

  <path d="M 25,82 L 25,18 C 93,18 93,66 25,66"
        fill="none" stroke="url(#pg)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="78" cy="42" r="3" fill="#93c5fd"/>

  <circle cx="78" cy="76"  r="3.5" fill="#60a5fa"/>
  <circle cx="78" cy="90"  r="3.5" fill="#60a5fa"/>
  <circle cx="78" cy="104" r="3.5" fill="#60a5fa"/>

  <path d="M 78,110 C 90,110 91,121 78,126 C 65,121 66,110 78,110 Z"
        fill="url(#bg)" filter="url(#bs)"/>

  <line x1="78" y1="130" x2="57" y2="130"
        stroke="url(#lg)" stroke-width="8" stroke-linecap="round"/>
</svg>
